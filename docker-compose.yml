services:
  db:
    image: postgres:17
    container_name: contentguard-postgres
    environment:
      POSTGRES_USER: contentguard
      POSTGRES_PASSWORD: contentguard
      POSTGRES_DB: contentguard_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
